<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGO Dashboard</title>
</head>
<body>
    <h1>NGO Dashboard</h1>

    <section>
        <button id="profile-btn" type="button">Profile</button>
        <button id="login-btn" type="button">Login</button>
        <button id="logout-btn" type="button">Logout</button>
        <button id="history-btn" type="button">Donor History</button>
    </section>

    <p id="feature-status"></p>

    <section>
        <h2>Donors List</h2>
        <button id="refresh-donors-btn" type="button">Refresh Donor List</button>
        <p id="donor-list-status"></p>
        <ul id="donor-list"></ul>
    </section>

    <script src="./script.js"></script>
</body>
</html>
